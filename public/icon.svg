<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="An arrow threading itself off a dotted board">
  <title>tapNclear</title>

  <!--
    The icon is the rule: one arrow leaves head-first along its own body, out past the edge,
    while another still waits its turn. Same palette as theme.css - ink tile, one accent.

    Drawn for 16px first, which is a harsher constraint than it sounds. Two things follow
    from it, and both are why this does not simply reuse the in-game arrow proportions:

      - The heads are far wider than their stroke (roughly 2:1, where the game uses 1.2:1).
        A head only slightly wider than its body reads as a blunt rectangle once it is four
        pixels across - the triangle has to be exaggerated to survive at all.
      - There are two arrows, not the boardful the game shows. A third would be mush.

    The dots fade out entirely at favicon sizes. That is fine: they are texture, not
    information, and they earn their place on the 512px install icon.
  -->

  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252c57" />
      <stop offset="1" stop-color="#151936" />
    </linearGradient>
    <clipPath id="board">
      <rect width="64" height="64" rx="14" />
    </clipPath>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#tile)" />

  <g clip-path="url(#board)">
    <!-- The board. -->
    <g fill="#ffffff" fill-opacity="0.15">
      <circle cx="8" cy="8" r="1.5" />
      <circle cx="26" cy="8" r="1.5" />
      <circle cx="44" cy="8" r="1.5" />
      <circle cx="8" cy="26" r="1.5" />
      <circle cx="8" cy="44" r="1.5" />
      <circle cx="26" cy="56" r="1.5" />
      <circle cx="56" cy="44" r="1.5" />
      <circle cx="56" cy="56" r="1.5" />
    </g>

    <!-- Still on the board, pointing at an edge it has not reached: the arrow you did not tap. -->
    <g fill="#8b98ff">
      <path d="M44 39 L44 48" stroke="#8b98ff" stroke-width="9.5" stroke-linecap="butt" />
      <polygon points="44,60 35,48 53,48" />
    </g>

    <!-- Escaping: up the column, through the bend, head-first off the right edge. -->
    <g fill="#ffffff">
      <path
        d="M14 51 L14 24 L40 24"
        stroke="#ffffff"
        stroke-width="9.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
      <polygon points="57,24 39,13 39,35" />
    </g>
  </g>
</svg>
